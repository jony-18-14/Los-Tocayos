<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Tres Tocayos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI, sans-serif;
background:#050505;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

/* FUEGO ALREDEDOR */

.fuego{
position:fixed;
bottom:0;
left:0;
width:100%;
height:180px;
background:linear-gradient(
to top,
#ff3300,
#ff6600,
#ff9900,
transparent
);
filter:blur(10px);
animation:fuego 2s infinite alternate;
opacity:.8;
}

@keyframes fuego{
0%{height:160px;}
100%{height:220px;}
}

/* TARJETA */

.card{
position:relative;
width:520px;
text-align:center;
}

/* LOGO */

.logo{
width:170px;
height:170px;
margin:auto;
margin-bottom:25px;
border-radius:50%;
overflow:hidden;
border:4px solid #ff7b00;
box-shadow:0 0 30px #ff6a00;
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

/* PARRILLA */

.parrilla{
background:#111;
border:3px solid #555;
border-radius:15px;
padding:40px 20px;
position:relative;
box-shadow:
0 0 30px rgba(255,100,0,0.5),
inset 0 0 25px #000;
}

/* LINEAS DE PARRILLA */

.parrilla::before{
content:"";
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
90deg,
transparent,
transparent 25px,
#444 25px,
#444 30px
);
opacity:.35;
border-radius:15px;
}

/* NOMBRE */

.nombre{
font-size:2.7rem;
letter-spacing:4px;
color:#ffa347;
text-shadow:0 0 15px #ff6600;
margin-bottom:25px;
position:relative;
}

/* BOTON */

.btn{
background:linear-gradient(#ff9a2f,#ff4d00);
border:none;
padding:18px 55px;
font-size:1.7rem;
font-weight:bold;
border-radius:40px;
cursor:pointer;
letter-spacing:3px;
color:#2b0d00;
box-shadow:
0 6px 0 #7a2f00,
0 0 20px #ff6600;
transition:.15s;
position:relative;
}

.btn:hover{
transform:translateY(3px);
box-shadow:
0 3px 0 #7a2f00,
0 0 25px #ff6600;
}

/* CHISPAS */

.chispas{
position:absolute;
bottom:-20px;
width:100%;
display:flex;
justify-content:center;
gap:20px;
}

.chispa{
width:6px;
height:6px;
background:#ff7b00;
border-radius:50%;
box-shadow:0 0 8px #ff3300;
animation:chispa 1.5s infinite;
}

.chispa:nth-child(2){animation-delay:.5s}
.chispa:nth-child(3){animation-delay:1s}

@keyframes chispa{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-40px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="fuego"></div>

<div class="card">

<div class="logo">
<img src="Imagenes/LOGO.jpeg">
</div>

<div class="parrilla">

<div class="nombre">
LOS TOCAYOS
</div>

<button class="btn" onclick="window.location.href='menu.html'">
INGRESAR
</button>

<div class="chispas">
<div class="chispa"></div>
<div class="chispa"></div>
<div class="chispa"></div>
</div>

</div>

</div>

</body>

</html>
